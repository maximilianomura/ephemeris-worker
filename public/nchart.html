<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natal Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1A7A7E;
    --teal-light: #2a9da2;
    --teal-dim: rgba(26,122,126,0.15);
    --gold: #C9A84C;
    --gold-light: #e2c06a;
    --gold-dim: rgba(201,168,76,0.15);
    --bg: #F6FAFB;
    --bg-card: #ffffff;
    --ink: #1a2e30;
    --ink-soft: #4a6568;
    --border: rgba(26,122,126,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(26,122,126,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }

  /* ════════════════════════════
     IMPORT SCREEN
  ════════════════════════════ */
  #importScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .import-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.8rem 3rem;
    width: 100%;
    max-width: 680px;
    box-shadow:
      0 0 0 1px var(--border),
      0 12px 48px rgba(26,122,126,0.09),
      0 2px 8px rgba(201,168,76,0.06);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .import-star {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 1rem;
    color: var(--gold);
    opacity: 0.7;
  }

  .import-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 0.4rem;
  }

  .import-subtitle {
    text-align: center;
    font-size: 1rem;
    color: var(--gold);
    font-style: italic;
    margin-bottom: 2rem;
    letter-spacing: 0.04em;
  }

  .import-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 2rem;
  }

  /* Tabs */
  .import-tabs {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 1.4rem;
  }

  .import-tab {
    flex: 1;
    padding: 0.65rem 1rem;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    cursor: pointer;
    background: transparent;
    border: none;
    color: var(--ink-soft);
    transition: all 0.2s;
  }

  .import-tab.active { background: var(--teal); color: #fff; }
  .import-tab:not(.active):hover { background: var(--teal-dim); color: var(--teal); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Textarea */
  .json-textarea {
    width: 100%;
    height: 220px;
    background: #f0f7f7;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .json-textarea:focus { border-color: var(--teal); }
  .json-textarea.error { border-color: #c0392b; background: #fff5f5; }
  .json-textarea::placeholder { color: #9ab5b6; font-style: italic; }

  /* File upload */
  .file-drop {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .file-drop:hover, .file-drop.drag-over { border-color: var(--teal); background: var(--teal-dim); }
  .file-drop input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .file-drop-icon { font-size: 2rem; margin-bottom: 0.6rem; opacity: 0.5; }
  .file-drop-text {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.3rem;
  }
  .file-drop-sub { font-size: 0.82rem; color: var(--ink-soft); font-style: italic; }

  .file-loaded {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.8rem 1rem;
    background: var(--teal-dim);
    border: 1px solid rgba(26,122,126,0.25);
    border-radius: 8px; margin-top: 0.8rem;
    font-size: 0.88rem; color: var(--teal);
  }
  .file-loaded-icon { font-size: 1.2rem; }
  .file-loaded-name { flex: 1; font-style: italic; }
  .file-clear {
    background: none; border: none; cursor: pointer;
    color: var(--ink-soft); font-size: 1rem; padding: 0 0.2rem; transition: color 0.15s;
  }
  .file-clear:hover { color: #c0392b; }

  /* Error */
  .error-msg {
    display: none;
    color: #c0392b; font-size: 0.82rem; font-style: italic;
    margin-top: 0.7rem; padding: 0.5rem 0.8rem;
    background: #fff5f5; border-radius: 6px; border-left: 3px solid #c0392b;
  }
  .error-msg.visible { display: block; }

  /* Calculate button */
  .btn-calculate {
    width: 100%; margin-top: 1.6rem; padding: 1rem 2rem;
    font-family: 'Cinzel', serif; font-size: 0.75rem;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, var(--teal) 0%, #155f63 100%);
    border: none; border-radius: 10px; cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(26,122,126,0.3);
    position: relative; overflow: hidden;
  }
  .btn-calculate::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.15) 0%, transparent 100%);
    opacity: 0; transition: opacity 0.25s;
  }
  .btn-calculate:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(26,122,126,0.4); }
  .btn-calculate:hover::before { opacity: 1; }
  .btn-calculate:active { transform: translateY(0); }

  /* ════════════════════════════
     CHART SCREEN
  ════════════════════════════ */
  #chartScreen { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #chartScreen.visible { animation: fadeIn 0.5s ease both; }

  header {
    text-align: center;
    padding: 2rem 1rem 0.8rem;
    position: relative;
  }
  header::after {
    content: ''; display: block; width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.8rem auto 0;
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 600; color: var(--teal);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .subtitle {
    font-size: 1rem; color: var(--gold);
    font-style: italic; margin-top: 0.3rem; letter-spacing: 0.05em;
  }
  .meta-row {
    display: flex; justify-content: center;
    gap: 2rem; margin-top: 0.5rem;
    font-size: 0.85rem; color: var(--ink-soft);
    letter-spacing: 0.04em; flex-wrap: wrap;
  }
  .meta-row span { display: flex; align-items: center; gap: 0.4rem; }
  .meta-row span::before { content: '◆'; font-size: 0.4rem; color: var(--gold); }

  .btn-reset {
    display: inline-flex; align-items: center; gap: 0.4rem;
    margin-top: 0.8rem; padding: 0.4rem 1rem;
    font-family: 'Cinzel', serif; font-size: 0.58rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ink-soft); background: transparent;
    border: 1px solid var(--border); border-radius: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

  .layout {
    display: grid;
    grid-template-columns: 1fr minmax(320px, 480px) 1fr;
    gap: 1.5rem;
    max-width: 1280px;
    margin: 1.2rem auto;
    padding: 0 1.5rem 3rem;
    align-items: start;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .chart-wrap { grid-column: 1 !important; }
  }

  .chart-wrap { grid-column: 2; position: relative; }

  .chart-svg-container {
    background: var(--bg-card);
    border-radius: 50%;
    box-shadow:
      0 0 0 1px var(--border),
      0 8px 40px rgba(26,122,126,0.10),
      0 2px 8px rgba(201,168,76,0.08);
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  #chartSvg { width: 100%; height: 100%; }

  .panel-left, .panel-right { display: flex; flex-direction: column; gap: 1rem; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem 1.4rem;
    box-shadow: 0 2px 12px rgba(26,122,126,0.05);
  }
  .card-title {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--teal); margin-bottom: 0.9rem;
    padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  }

  .planet-row {
    display: grid; grid-template-columns: 22px 1fr 1fr auto;
    align-items: center; gap: 0.5rem;
    padding: 0.35rem 0;
    border-bottom: 1px solid rgba(26,122,126,0.06);
    font-size: 0.9rem; transition: background 0.15s;
  }
  .planet-row:last-child { border-bottom: none; }
  .planet-row:hover { background: var(--teal-dim); border-radius: 6px; }
  .p-symbol { font-size: 1rem; color: var(--teal); text-align: center; line-height: 1; }
  .p-name { font-weight: 400; color: var(--ink); }
  .p-pos { color: var(--ink-soft); font-style: italic; font-size: 0.82rem; }
  .p-house {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    color: var(--gold); background: var(--gold-dim);
    padding: 0.15rem 0.45rem; border-radius: 20px; white-space: nowrap;
  }
  .retro { color: var(--gold); font-size: 0.7rem; margin-left: 2px; }

  .houses-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem 1rem; }
  .house-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.85rem; padding: 0.25rem 0;
    border-bottom: 1px solid rgba(26,122,126,0.06);
  }
  .house-num { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--teal); min-width: 28px; }
  .house-sign { color: var(--ink-soft); font-style: italic; font-size: 0.8rem; }

  .aspect-row {
    display: grid; grid-template-columns: 1fr auto 1fr auto;
    align-items: center; gap: 0.4rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(26,122,126,0.06);
    font-size: 0.85rem;
  }
  .aspect-row:last-child { border-bottom: none; }
  .asp-planet { color: var(--ink-soft); font-style: italic; }
  .asp-type {
    font-family: 'Cinzel', serif; font-size: 0.6rem;
    letter-spacing: 0.1em; padding: 0.12rem 0.5rem;
    border-radius: 20px; white-space: nowrap; text-align: center;
  }
  .asp-orb { color: var(--ink-soft); font-size: 0.75rem; text-align: right; }
  .asp-trine      { background: rgba(26,122,126,0.12); color: var(--teal); }
  .asp-sextile    { background: rgba(26,122,126,0.08); color: var(--teal-light); }
  .asp-square     { background: rgba(201,168,76,0.15); color: #9a6e1a; }
  .asp-opposition { background: rgba(180,60,60,0.10);  color: #8b3030; }
  .asp-conjunction{ background: rgba(201,168,76,0.2);  color: var(--gold); }
  .asp-other      { background: var(--teal-dim);       color: var(--teal); }

  .angle-pair {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.45rem 0; border-bottom: 1px solid rgba(26,122,126,0.06); font-size: 0.9rem;
  }
  .angle-pair:last-child { border-bottom: none; }
  .angle-label { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--teal); letter-spacing: 0.1em; }
  .angle-value { color: var(--ink-soft); font-style: italic; }

  .legend { display: flex; flex-wrap: wrap; gap: 0.6rem 1.2rem; margin-top: 0.5rem; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--ink-soft); }
  .legend-line { width: 24px; height: 2px; border-radius: 2px; }

  /* Particles */
  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-60px) translateX(var(--dx)); opacity: 0; }
  }
  .particle {
    position: fixed; width: 3px; height: 3px; border-radius: 50%;
    background: var(--gold); pointer-events: none;
    animation: floatUp var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
</style>
</head>
<body>

<!-- ══════════════════════════
     IMPORT SCREEN
══════════════════════════ -->
<div id="importScreen">
  <div class="import-card">
    <div class="import-star">✦</div>
    <div class="import-title">Natal Chart</div>
    <div class="import-subtitle">Import your chart data to begin</div>
    <div class="import-divider"></div>

    <div class="import-tabs">
      <button class="import-tab active" onclick="switchTab('paste')">✦ Paste JSON</button>
      <button class="import-tab" onclick="switchTab('file')">✦ Upload File</button>
    </div>

    <!-- Paste tab -->
    <div class="tab-panel active" id="tabPaste">
      <textarea
        class="json-textarea"
        id="jsonInput"
        placeholder='Paste your natal chart JSON here…

{
  "ascendant": { ... },
  "midheaven":  { ... },
  "planets":   [ ... ],
  "houses":    [ ... ],
  "aspects":   [ ... ]
}'
        oninput="clearError()"
      ></textarea>
    </div>

    <!-- File tab -->
    <div class="tab-panel" id="tabFile">
      <div class="file-drop" id="fileDrop">
        <input type="file" accept=".json,application/json" id="fileInput" onchange="handleFile(this)">
        <div class="file-drop-icon">☁</div>
        <div class="file-drop-text">Drop your JSON file here</div>
        <div class="file-drop-sub">or click to browse</div>
      </div>
      <div class="file-loaded" id="fileLoaded" style="display:none;">
        <span class="file-loaded-icon">✦</span>
        <span class="file-loaded-name" id="fileLoadedName"></span>
        <button class="file-clear" onclick="clearFile()" title="Remove">✕</button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-calculate" onclick="calculate()">
      ◉ &nbsp; Calculate Chart
    </button>
  </div>
</div>

<!-- ══════════════════════════
     CHART SCREEN
══════════════════════════ -->
<div id="chartScreen">
  <header>
    <div class="title">Natal Chart</div>
    <div class="subtitle" id="chartSubtitle">Tropical · Placidus House System</div>
    <div class="meta-row">
      <span id="metaAsc"></span>
      <span id="metaMc"></span>
    </div>
    <div style="text-align:center; margin-top:0.6rem;">
      <button class="btn-reset" onclick="resetToImport()">↩ Import New Chart</button>
    </div>
  </header>

  <div class="layout">

    <div class="panel-left">
      <div class="card">
        <div class="card-title">Planets & Positions</div>
        <div id="planetList"></div>
      </div>
      <div class="card">
        <div class="card-title">Angles</div>
        <div id="anglesList"></div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-svg-container">
        <svg id="chartSvg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="card" style="margin-top:1rem;">
        <div class="card-title">Aspect Legend</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-line" style="background:#1A7A7E;"></div>Trine</div>
          <div class="legend-item"><div class="legend-line" style="background:#2a9da2;opacity:0.7;"></div>Sextile</div>
          <div class="legend-item"><div class="legend-line" style="background:#C9A84C;"></div>Square</div>
          <div class="legend-item"><div class="legend-line" style="background:#8b3030;"></div>Opposition</div>
          <div class="legend-item"><div class="legend-line" style="border-top:2px dashed #C9A84C;height:0;width:24px;"></div>Conjunction</div>
        </div>
      </div>
    </div>

    <div class="panel-right">
      <div class="card">
        <div class="card-title">House Cusps</div>
        <div class="houses-grid" id="houseList"></div>
      </div>
      <div class="card">
        <div class="card-title">Aspects</div>
        <div id="aspectList"></div>
      </div>
    </div>

  </div>
</div>

<script>
/* ══ IMPORT LOGIC ══ */
let loadedFileContent = null;

function switchTab(tab) {
  document.querySelectorAll('.import-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  if (tab === 'paste') {
    document.getElementById('tabPaste').classList.add('active');
    document.querySelectorAll('.import-tab')[0].classList.add('active');
  } else {
    document.getElementById('tabFile').classList.add('active');
    document.querySelectorAll('.import-tab')[1].classList.add('active');
  }
  clearError();
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    loadedFileContent = e.target.result;
    document.getElementById('fileLoaded').style.display = 'flex';
    document.getElementById('fileLoadedName').textContent = file.name;
    clearError();
  };
  reader.readAsText(file);
}

function clearFile() {
  loadedFileContent = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileLoaded').style.display = 'none';
}

// Drag & drop
const fileDrop = document.getElementById('fileDrop');
fileDrop.addEventListener('dragover',  e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
fileDrop.addEventListener('drop', e => {
  e.preventDefault(); fileDrop.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    handleFile(document.getElementById('fileInput'));
  }
});

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.classList.add('visible');
  document.getElementById('jsonInput').classList.add('error');
}
function clearError() {
  document.getElementById('errorMsg').classList.remove('visible');
  document.getElementById('jsonInput').classList.remove('error');
}

function calculate() {
  clearError();
  const isPaste = document.getElementById('tabPaste').classList.contains('active');
  let raw = isPaste ? document.getElementById('jsonInput').value.trim() : loadedFileContent;

  if (!raw) {
    showError(isPaste
      ? 'Please paste your JSON data before calculating.'
      : 'Please upload a JSON file before calculating.');
    return;
  }

  let data;
  try { data = JSON.parse(raw); }
  catch(e) { showError('Invalid JSON — ' + e.message); return; }

  if (!data.ascendant || !data.planets || !data.houses) {
    showError('JSON is missing required fields: ascendant, planets, or houses.');
    return;
  }

  renderChart(data);
}

function resetToImport() {
  document.getElementById('chartScreen').style.display = 'none';
  document.getElementById('chartScreen').classList.remove('visible');
  document.getElementById('importScreen').style.display = 'flex';
  ['chartSvg','planetList','houseList','aspectList','anglesList'].forEach(id => {
    document.getElementById(id).innerHTML = '';
  });
  document.querySelectorAll('.particle').forEach(p => p.remove());
}

/* ══ CHART RENDERING ══ */
const TEAL = '#1A7A7E', GOLD = '#C9A84C';
const CX = 250, CY = 250;
const R_OUTER = 230, R_ZODIAC = 210, R_ZODIAC_IN = 185;
const R_HOUSE = 180, R_HOUSE_IN = 140, R_INNER = 135;
const ZODIAC_GLYPHS = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
const ROMAN = ['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];

function svgEl(tag, attrs = {}, text = '') {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text) e.textContent = text;
  return e;
}

function renderChart(DATA) {
  // Switch screens
  document.getElementById('importScreen').style.display = 'none';
  const cs = document.getElementById('chartScreen');
  cs.style.display = 'block';
  setTimeout(() => cs.classList.add('visible'), 10);

  // Header
  document.getElementById('metaAsc').textContent = 'Ascendant: ' + DATA.ascendant.formatted;
  document.getElementById('metaMc').textContent  = 'Midheaven: ' + DATA.midheaven.formatted;
  const hs = DATA.meta?.houseSystem === 'P' ? 'Placidus' : (DATA.meta?.houseSystem || 'Placidus');
  const zd = DATA.meta?.zodiac ? DATA.meta.zodiac[0].toUpperCase() + DATA.meta.zodiac.slice(1) : 'Tropical';
  document.getElementById('chartSubtitle').textContent = zd + ' · ' + hs + ' House System';

  // Coordinate helpers
  const ascLon = DATA.ascendant.signIndex * 30 + DATA.ascendant.degree + DATA.ascendant.minute / 60;
  const mcLon  = DATA.midheaven.signIndex  * 30 + DATA.midheaven.degree  + DATA.midheaven.minute  / 60;

  function lonToAngle(lon) { return (180 - (lon - ascLon) + 360) % 360; }
  function lonToPoint(lon, r) {
    const rad = (lonToAngle(lon) - 90) * Math.PI / 180;
    return { x: CX + r * Math.cos(rad), y: CY + r * Math.sin(rad) };
  }
  function circle(r, stroke, fill='none', sw=0.8, op=1) {
    return svgEl('circle', { cx:CX, cy:CY, r, stroke, fill, 'stroke-width':sw, opacity:op });
  }

  // Build SVG
  const svg = document.getElementById('chartSvg');
  svg.innerHTML = '';

  // Defs
  const defs = svgEl('defs');
  const rg = svgEl('radialGradient', { id:'bgGlow', cx:'50%', cy:'50%', r:'50%' });
  rg.appendChild(svgEl('stop', { offset:'0%',   'stop-color':'#e8f5f5' }));
  rg.appendChild(svgEl('stop', { offset:'100%', 'stop-color':'#F6FAFB' }));
  defs.appendChild(rg);
  const filt = svgEl('filter', { id:'glow', x:'-20%', y:'-20%', width:'140%', height:'140%' });
  const feG  = svgEl('feGaussianBlur', { stdDeviation:'3', result:'blur' });
  const feM  = svgEl('feMerge');
  feM.appendChild(svgEl('feMergeNode', { in:'blur' }));
  feM.appendChild(svgEl('feMergeNode', { in:'SourceGraphic' }));
  filt.appendChild(feG); filt.appendChild(feM); defs.appendChild(filt);
  svg.appendChild(defs);

  svg.appendChild(svgEl('circle', { cx:CX, cy:CY, r:R_OUTER, fill:'url(#bgGlow)' }));

  // Zodiac band
  for (let i = 0; i < 12; i++) {
    const a1 = (lonToAngle(i*30)     - 90) * Math.PI / 180;
    const a2 = (lonToAngle((i+1)*30) - 90) * Math.PI / 180;
    const r1 = R_ZODIAC_IN, r2 = R_ZODIAC;
    const x1=CX+r2*Math.cos(a1), y1=CY+r2*Math.sin(a1);
    const x2=CX+r2*Math.cos(a2), y2=CY+r2*Math.sin(a2);
    const x3=CX+r1*Math.cos(a2), y3=CY+r1*Math.sin(a2);
    const x4=CX+r1*Math.cos(a1), y4=CY+r1*Math.sin(a1);
    svg.appendChild(svgEl('path', {
      d:`M ${x1} ${y1} A ${r2} ${r2} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${r1} ${r1} 0 0 0 ${x4} ${y4} Z`,
      fill: i%2===0 ? 'rgba(26,122,126,0.04)' : 'rgba(201,168,76,0.04)',
      stroke:'rgba(26,122,126,0.12)', 'stroke-width':0.5
    }));
    const mA = ((lonToAngle(i*30) + lonToAngle((i+1)*30)) / 2 - 90) * Math.PI / 180;
    const rM = (r1+r2)/2;
    svg.appendChild(svgEl('text', {
      x: CX+rM*Math.cos(mA), y: CY+rM*Math.sin(mA),
      'text-anchor':'middle', 'dominant-baseline':'central',
      'font-size':'11', fill: i%4<2 ? TEAL : GOLD, opacity:0.85
    }, ZODIAC_GLYPHS[i]));
  }

  // Rings
  svg.appendChild(circle(R_OUTER,    TEAL, 'none', 1.2, 0.4));
  svg.appendChild(circle(R_ZODIAC,   TEAL, 'none', 0.6, 0.5));
  svg.appendChild(circle(R_ZODIAC_IN,TEAL, 'none', 0.6, 0.4));
  svg.appendChild(circle(R_HOUSE_IN, TEAL, 'none', 0.6, 0.3));
  svg.appendChild(circle(R_INNER,    TEAL, 'none', 0.8, 0.2));

  // House lines
  for (const h of DATA.houses) {
    const p1 = lonToPoint(h.cusp, R_ZODIAC_IN);
    const p2 = lonToPoint(h.cusp, 0);
    const ang = [1,4,7,10].includes(h.house);
    svg.appendChild(svgEl('line', {
      x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y,
      stroke: ang ? GOLD : TEAL, 'stroke-width': ang ? 1 : 0.5, opacity: ang ? 0.7 : 0.25
    }));
    const nxt = DATA.houses[(h.house % 12)].cusp;
    const mid = h.cusp + ((nxt - h.cusp + 360) % 360) / 2;
    const lp  = lonToPoint(mid, (R_HOUSE + R_HOUSE_IN) / 2);
    svg.appendChild(svgEl('text', {
      x:lp.x, y:lp.y, 'text-anchor':'middle', 'dominant-baseline':'central',
      'font-size':'8', 'font-family':'Cinzel, serif', fill:TEAL, opacity:0.5
    }, h.house.toString()));
  }

  // Aspects
  const ASP = {
    'Trine':       { color:TEAL,      dash:'none', width:1.2 },
    'Sextile':     { color:'#2a9da2', dash:'4,3',  width:0.8 },
    'Square':      { color:GOLD,      dash:'none', width:1.0 },
    'Opposition':  { color:'#8b3030', dash:'5,3',  width:1.0 },
    'Conjunction': { color:'#e2c06a', dash:'2,2',  width:1.2 },
  };
  const getPLon = n => { const p = DATA.planets.find(p=>p.name===n); return p ? p.longitude : null; };
  if (DATA.aspects) {
    for (const a of DATA.aspects) {
      const l1=getPLon(a.planet1), l2=getPLon(a.planet2);
      if (l1===null||l2===null) continue;
      const pp1=lonToPoint(l1,R_INNER-4), pp2=lonToPoint(l2,R_INNER-4);
      const s = ASP[a.type] || { color:'#aaa', dash:'3,3', width:0.6 };
      svg.appendChild(svgEl('line', {
        x1:pp1.x, y1:pp1.y, x2:pp2.x, y2:pp2.y,
        stroke:s.color, 'stroke-width':s.width,
        'stroke-dasharray':s.dash,
        opacity: Math.max(0.2, 0.9 - a.orb * 0.12)
      }));
    }
  }

  // Planets
  for (const p of DATA.planets) {
    const pt  = lonToPoint(p.longitude, R_HOUSE_IN + 14);
    const tk1 = lonToPoint(p.longitude, R_HOUSE_IN);
    const tk2 = lonToPoint(p.longitude, R_HOUSE_IN - 8);
    svg.appendChild(svgEl('line', { x1:tk1.x,y1:tk1.y,x2:tk2.x,y2:tk2.y, stroke:GOLD,'stroke-width':1,opacity:0.7 }));
    svg.appendChild(svgEl('circle', { cx:pt.x,cy:pt.y,r:9, fill:'rgba(246,250,251,0.9)', stroke:p.retrograde?GOLD:TEAL,'stroke-width':0.8,opacity:0.9 }));
    svg.appendChild(svgEl('text', { x:pt.x,y:pt.y,'text-anchor':'middle','dominant-baseline':'central','font-size':'10',fill:p.retrograde?GOLD:TEAL,filter:'url(#glow)' }, p.symbol));
  }

  // Axis markers
  function axis(lon, label, color) {
    const p1=lonToPoint(lon,R_ZODIAC), p2=lonToPoint(lon,R_INNER-20);
    svg.appendChild(svgEl('line', { x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:color,'stroke-width':1.5,opacity:0.8 }));
    const lp=lonToPoint(lon,R_OUTER-10);
    svg.appendChild(svgEl('text', { x:lp.x,y:lp.y,'text-anchor':'middle','dominant-baseline':'central','font-size':'7','font-family':'Cinzel, serif',fill:color,opacity:0.9 }, label));
  }
  axis(ascLon,       'ASC', GOLD);
  axis(ascLon + 180, 'DSC', GOLD);
  axis(mcLon,        'MC',  TEAL);
  axis(mcLon  + 180, 'IC',  TEAL);

  svg.appendChild(svgEl('circle', { cx:CX,cy:CY,r:4, fill:GOLD,opacity:0.7 }));
  svg.appendChild(svgEl('circle', { cx:CX,cy:CY,r:2, fill:'#fff' }));

  /* ── Side panels ── */
  // Planets
  const pl = document.getElementById('planetList'); pl.innerHTML = '';
  for (const p of DATA.planets) {
    const r = document.createElement('div'); r.className = 'planet-row';
    r.innerHTML = `<span class="p-symbol">${p.symbol}</span>
      <span class="p-name">${p.name}${p.retrograde?'<span class="retro">℞</span>':''}</span>
      <span class="p-pos">${p.position.formatted}</span>
      <span class="p-house">H${p.house}</span>`;
    pl.appendChild(r);
  }

  // Angles
  const al = document.getElementById('anglesList'); al.innerHTML = '';
  const ds = DATA.houses.find(h=>h.house===7)?.position?.formatted || '';
  const ic = DATA.houses.find(h=>h.house===4)?.position?.formatted || '';
  [['ASC — 1st House', DATA.ascendant.formatted],
   ['MC — 10th House',  DATA.midheaven.formatted],
   ['DSC — 7th House',  ds],
   ['IC — 4th House',   ic]
  ].forEach(([label, val]) => {
    const d = document.createElement('div'); d.className = 'angle-pair';
    d.innerHTML = `<span class="angle-label">${label}</span><span class="angle-value">${val}</span>`;
    al.appendChild(d);
  });

  // Houses
  const hl = document.getElementById('houseList'); hl.innerHTML = '';
  for (const h of DATA.houses) {
    const r = document.createElement('div'); r.className = 'house-row';
    r.innerHTML = `<span class="house-num">${ROMAN[h.house]}</span><span class="house-sign">${h.position.formatted}</span>`;
    hl.appendChild(r);
  }

  // Aspects
  const asl = document.getElementById('aspectList'); asl.innerHTML = '';
  const aspCls = { 'Trine':'asp-trine','Sextile':'asp-sextile','Square':'asp-square','Opposition':'asp-opposition','Conjunction':'asp-conjunction' };
  if (DATA.aspects) {
    for (const a of DATA.aspects) {
      const p1 = DATA.planets.find(p=>p.name===a.planet1);
      const p2 = DATA.planets.find(p=>p.name===a.planet2);
      const r = document.createElement('div'); r.className = 'aspect-row';
      r.innerHTML = `<span class="asp-planet">${p1?p1.symbol:''} ${a.planet1}</span>
        <span class="asp-type ${aspCls[a.type]||'asp-other'}">${a.type}</span>
        <span class="asp-planet">${p2?p2.symbol:''} ${a.planet2}</span>
        <span class="asp-orb">${a.orb.toFixed(2)}°</span>`;
      asl.appendChild(r);
    }
  }

  // Particles
  document.querySelectorAll('.particle').forEach(p => p.remove());
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}vw;bottom:${Math.random()*30}vh;--dur:${4+Math.random()*6}s;--delay:${Math.random()*6}s;--dx:${(Math.random()-0.5)*40}px;opacity:0;`;
    document.body.appendChild(p);
  }
}
</script>
</body>
</html>
